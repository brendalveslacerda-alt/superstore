<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Superstore{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 16px 32px;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        main {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }

        td { padding: 10px 16px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f4f8; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .Furniture       { background: #8e44ad; }
        .Technology      { background: #2980b9; }
        .Office.Supplies { background: #27ae60; }
    </style>
</head>
<body>
    <header>
        <a href="/">🛒 Superstore — Cadastro de Produtos</a>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
